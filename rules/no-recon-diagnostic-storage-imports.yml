# Keep recon runtime/proof modules from becoming diagnostic storage/query code.
#
# Recon may emit domain observations through d810.recon.observability and may own
# in-memory stores. SQLite diagnostic persistence and post-hoc DB query helpers
# belong in d810.core.diag or d810.diagnostics.

id: no-recon-diagnostic-storage-imports
language: python
severity: error

files:
  - "src/d810/recon/**/*.py"

ignores:
  # Existing recon-local persistent stores are behavior/data stores, not diag DB.
  - "src/d810/recon/store.py"
  - "src/d810/recon/artifacts.py"

message: |
  Recon modules must not import diagnostic storage APIs directly.

  Use d810.recon.observability to emit in-memory domain observations.
  Persist/query SQLite diagnostics from d810.core.diag or d810.diagnostics.

rule:
  any:
    - pattern: import sqlite3
    - pattern: from sqlite3 import $$$
    - pattern: import d810.core.diag
    - pattern: import d810.core.diag.$MOD
    - pattern: from d810.core.diag import $$$
    - pattern: from d810.core.diag.$MOD import $$$

note: |
  Runtime behavior must use in-memory recon/cfg evidence, not persisted diag DB
  rows. Diagnostic DB rows are an observability/query surface only.
