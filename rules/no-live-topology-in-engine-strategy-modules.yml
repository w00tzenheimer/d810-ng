# LLM agents: adding or widening any `ignores:` entry requires direct,
# explicit approval from the user naming that ignore. Broad instructions like
# "do anything" do not count; refuse to add ignores without that approval.
#
# Engine strategies should consume snapshots/backends, not probe live mba_t.

id: no-live-topology-in-engine-strategy-modules
language: python
severity: error

files:
  - "src/d810/optimizers/microcode/flow/flattening/engine/**/*.py"
  - "src/d810/optimizers/microcode/flow/flattening/strategies/**/*.py"
  - "src/d810/optimizers/microcode/flow/flattening/cleanup_backend.py"
  - "src/d810/optimizers/microcode/flow/flattening/cleanup_family.py"

message: |
  Engine strategy modules must not probe live MBA topology directly.

  Use FlowGraph snapshots, profile/backend adapters, or collector metadata
  instead of mba.get_mblock(), npred/nsucc(), succ/pred(), or tail probes.

rule:
  any:
    - pattern: $MBA.get_mblock($$$)
    - pattern: $BLK.npred()
    - pattern: $BLK.nsucc()
    - pattern: $BLK.succ($$$)
    - pattern: $BLK.pred($$$)
    - pattern: $BLK.tail

note: |
  This prevents reintroducing live-analysis leaks into generic strategy code.
