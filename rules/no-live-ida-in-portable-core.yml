# Forbids live IDA / Hex-Rays imports in the portable-core layers of
# the target llvm-lisa-restructure layout.
#
# Successor to `no-live-hexrays-in-pure-cfg.yml` (which scopes only
# `src/d810/cfg/**`) and the staged
# `no-live-ida-in-pre-analysis-staged.yml` that landed on the
# recon-to-analysis branch. This rule scopes to BOTH the current
# pre-restructure layout (recon/, parts of cfg/) AND the target
# layout (analyses/, transforms/, passes/, ir/, capabilities/,
# support/) so it fires the same way before and after each slice.
#
# This rule is the hard gate for direct live IDA / Hex-Rays imports in
# portable-core candidate files. It was the llvm-lisa-restructure
# migration meter while the count was nonzero; after the cleanup slices,
# the target is to keep it at zero.
#
# Tracking: docs/plans/recon-and-cfg-restructuring.md (Risk Register,
#           Validation Gate Per Slice, Suggested Landing Sequence)

id: no-live-ida-in-portable-core
language: python
# Severity is ERROR now that the direct live-IDA import count is zero.
# Future slices that need live vendor APIs must move them behind a backend,
# adapter, or capability boundary rather than reintroducing them into
# portable-core candidates.
#
# This rule IS the load-bearing migration meter during the cleanup
# window.  The companion `portable-core-no-ida` import-linter contract
# is currently KEPT because its `source_modules` lists ONLY packages
# that are already clean (d810.families, d810.capabilities); legacy
# violators (d810.recon, etc.) are intentionally OUT of that contract's
# scope until they get cleaned, at which point the slice that cleans
# them appends them to the contract's `source_modules` and from that
# point on the contract gates the newly-clean code.
#
# Secondary check: the audit `rg` recipe in
# `docs/plans/recon-and-cfg-restructuring.md` (`## Validation Gate
# Per Slice`) catches lazy in-function and aliased IDA imports that
# this rule's `import` patterns may miss.  The two channels (ast-grep
# warnings + audit grep) should converge to zero together.
severity: error

files:
  # Both target portable-core packages (LLVM/LiSA taxonomy from the
  # plan) AND current pre-restructure portable-core candidate packages.
  # The legacy entries (recon, pre_analysis, cfg/flowgraph) drive the
  # warning count down as the migration progresses.
  - "src/d810/support/**/*.py"
  - "src/d810/ir/**/*.py"
  - "src/d810/capabilities/**/*.py"
  - "src/d810/analyses/**/*.py"
  - "src/d810/transforms/**/*.py"
  - "src/d810/passes/**/*.py"
  # families landed IDA-free through LS13; LS14 enrolls it in the scan.
  - "src/d810/families/**/*.py"
  # Per-file additions (NOT whole-package; the parent package still has
  # legitimate IDA-importing modules):
  #   optimizers/core.py was de-coupled from IDA in slice 7
  #   (Protocol scaffolding for OptimizationRule).  The rest of
  #   d810.optimizers/ is intentionally NOT in this rule's scope --
  #   concrete rules under microcode/, peephole/, etc. legitimately
  #   import ida_hexrays.
  - "src/d810/optimizers/core.py"
ignores:
  - "src/d810/backends/**/*.py"
  - "tests/**"

message: |
  Portable-core layers (support, ir, capabilities, analyses,
  transforms, passes; plus current portable-core candidate files under
  recon/ and cfg/) must NOT import live IDA / Hex-Rays APIs
  (idaapi, ida_hexrays, idc, idautils, ida_*).

  Portable layers consume the semantic IR from `d810.ir`
  (FlowGraph / BlockSnapshot / InsnSnapshot / MopSnapshot) plus
  the OperandKind / InsnKind / BranchPredicate enums, AND
  dependency-injected capability protocols from `d810.capabilities`.

  Vendor lifts and capability implementations live in
  `d810/backends/<vendor>/lifter.py` and
  `d810/backends/<vendor>/capabilities.py`.

rule:
  any:
    # Module-level imports
    - pattern: import idaapi
    - pattern: import ida_hexrays
    - pattern: import idc
    - pattern: import idautils
    - pattern: import ida_$MOD
    - pattern: from idaapi import $$$
    - pattern: from ida_hexrays import $$$
    - pattern: from idc import $$$
    - pattern: from idautils import $$$
    - pattern: from ida_$MOD import $$$
    # Aliased forms
    - pattern: import idaapi as $ALIAS
    - pattern: import ida_hexrays as $ALIAS
    - pattern: import idc as $ALIAS
    - pattern: import ida_$MOD as $ALIAS

note: |
  Three lawful fixes (decision tree from the Audit Rubric):

  (a) Already covered by the snapshot IR
      Rewrite to consume BlockSnapshot / InstructionSnapshot fields
      and the OperandKind / InsnKind / BranchPredicate enums.

  (b) Snapshot is missing semantic information
      Extend BlockSnapshot / InsnSnapshot / MopSnapshot with the
      needed field; backend lifters populate it. One-time IR
      investment.

  (c) Needs a capability protocol
      Add a semantic Protocol to `d810/capabilities/` (e.g.
      ValRangeCapability, DefUseCapability); implement in
      `backends/<vendor>/capabilities.py`; inject via composition
      root.

  (d) Genuinely vendor-irreducible
      The file is not portable-core. Relocate to a HIGH module
      or `backends/<vendor>/mutation.py`.

  HONEST AUDIT (catches lazy in-function imports this rule's `files:`
  glob does not see at definition time):

      rg -nP '(?:^|\s+)(import|from)\s+(idaapi|ida_\w+|idc|idautils)\b' \
         src/d810/{support,ir,capabilities,analyses,transforms,passes,families,recon,pre_analysis}/

  The rule and the audit grep must converge to empty together.
