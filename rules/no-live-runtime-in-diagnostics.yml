# Keep diagnostics as post-hoc query/render tooling.
#
# Diagnostics may query SQLite diagnostic databases and call pure cfg/recon
# helpers to explain persisted rows. They should not depend on live IDA/
# Hex-Rays APIs or optimizer runtime strategy modules.

id: no-live-runtime-in-diagnostics
language: python
severity: error

files:
  - "src/d810/diagnostics/**/*.py"
  - "src/d810/core/diag/**/*.py"

ignores:
  # Existing live, non-mutating IDA probe used from manager.py during GLBOPT
  # byte-DCE investigations. Keep this as the explicit exception; new live
  # probes should go behind an evaluator/backend boundary instead.
  - "src/d810/diagnostics/glbopt_dce_probe.py"

  # Pseudocode capture intentionally runs inside IDA when collecting before /
  # after decompiler output. Its pure DB parsing helpers remain in the same
  # module for the CLI migration, so keep the whole tool explicit for now.
  - "src/d810/diagnostics/pseudocode_capture.py"

message: |
  Diagnostics must stay post-hoc and runtime-neutral.

  Query persisted diagnostic rows from d810.core.diag / d810.diagnostics, and
  use pure cfg/recon helpers for explanation. Do not import live IDA/Hex-Rays
  APIs or optimizer strategy/runtime modules here.

rule:
  any:
    - pattern: import idaapi
    - pattern: import ida_hexrays
    - pattern: import idc
    - pattern: import idautils
    - pattern: import ida_$MOD
    - pattern: from idaapi import $$$
    - pattern: from ida_hexrays import $$$
    - pattern: from idc import $$$
    - pattern: from idautils import $$$
    - pattern: from ida_$MOD import $$$
    - pattern: import d810.hexrays
    - pattern: import d810.hexrays.$$$
    - pattern: from d810.hexrays import $$$
    - pattern: from d810.hexrays.$$$ import $$$
    - pattern: import d810.optimizers
    - pattern: import d810.optimizers.$$$
    - pattern: from d810.optimizers import $$$
    - pattern: from d810.optimizers.$$$ import $$$

note: |
  If a diagnostic needs live MBA/Hex-Rays evidence, capture that evidence in an
  evaluator/backend or observability event first, then query/render it here.
