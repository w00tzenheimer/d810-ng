# Catches the soundness gap the recon-to-analysis review surfaced:
# a fixpoint call (`run_forward_fixpoint` / `run_valrange_fixpoint`)
# without an explicit `raise_on_nonconvergence=True` keyword argument.
# A partial-iteration fixpoint can drive return-carrier, DSVE, or
# constant-fold decisions and corrupt downstream analyses.
#
# Background: an earlier version of this rule tried to detect "read
# `.in_states`/`.out_states` without an in-scope `.converged` check"
# via ast-grep's relational matching (`inside.has` + `not.inside.has`
# sharing metavariables).  That pattern did not fire reliably under
# ast-grep 0.42.3.  R1 of the static-rules plan resolved this by
# changing the API instead: `run_forward_fixpoint` /
# `run_valrange_fixpoint` now accept `raise_on_nonconvergence: bool`,
# and soundness-critical callers MUST pass `raise_on_nonconvergence=True`.
# That makes the rule a simple "call-must-contain-kwarg" pattern that
# ast-grep handles cleanly via regex constraints on the call site.
#
# Lawful pattern (only one):
#     result = run_forward_fixpoint(..., raise_on_nonconvergence=True)
#     out = result.out_states[block]
#
# This rule does NOT recognize the "explicit `result.converged` check"
# form as lawful.  An earlier draft tried to implement that as an
# alternative via ast-grep's relational matching (`inside.has` +
# `not.inside.has` sharing metavariables), but that pattern does not
# fire reliably under ast-grep 0.42.3, so we settled on the simpler
# "kwarg-must-be-True" rule.  ALL non-engine callers of
# `run_forward_fixpoint`, `run_forward_fixpoint_on_mba`, or
# `run_valrange_fixpoint` must pass `raise_on_nonconvergence=True`
# (and catch `FixpointDidNotConverge` to apply their fallback).
# Diagnostic / best-effort callers should still pass the kwarg and
# catch the exception with their existing degraded-result branch --
# the explicit form is mandatory regardless of how the result is used.
#
# Tracking: docs/plans/2026-05-25-substrate-purity-static-rules.md (R1)

id: fixpoint-result-without-convergence-check
language: python
severity: error

files:
  - "src/d810/**/*.py"
ignores:
  # Engine implementation file with an internal fixpoint pass-through:
  # `run_forward_fixpoint_on_mba(..., raise_on_nonconvergence=raise_on_nonconvergence)`
  # passes the kwarg as a VARIABLE (forwarded from its own signature),
  # not as the literal `True` the rule's regex looks for.  The wrapper
  # is part of the engine surface so this is a lawful pass-through; the
  # whole file is exempt to avoid a false-positive on that one line.
  #
  # NOTE: valrange_dataflow.py is intentionally NOT in this ignore list.
  # It contains both the engine function (run_valrange_fixpoint) AND
  # the non-engine validation helper (validate_against_ida) which is a
  # real R1 consumer.  Both must satisfy the kwarg rule.
  - "src/d810/evaluator/hexrays_microcode/forward_dataflow.py"
  # Future engine homes from the llvm-lisa-restructure plan
  - "src/d810/analyses/data_flow/**/*.py"
  - "tests/**"

message: |
  Fixpoint call without `raise_on_nonconvergence=True`.

  `run_forward_fixpoint` / `run_valrange_fixpoint` may exit with the
  worklist non-empty when `max_iterations` is reached.  Reading
  `result.in_states` / `result.out_states` from that partial fixpoint
  propagates unsound facts and can corrupt return-carrier resolution,
  DSVE NOP decisions, constant-fold gates, and dead-branch elimination.

  Pass `raise_on_nonconvergence=True` and wrap the call in `try /
  except FixpointDidNotConverge` to fail closed.  If you are using the
  result for diagnostics only (no soundness-critical decisions),
  explicitly check `result.converged` before reading state.

rule:
  any:
    # Bare-name calls without the kwarg.
    - all:
        - pattern: run_forward_fixpoint($$$ARGS)
        - not:
            regex: "raise_on_nonconvergence\\s*=\\s*True"
    - all:
        - pattern: run_forward_fixpoint_on_mba($$$ARGS)
        - not:
            regex: "raise_on_nonconvergence\\s*=\\s*True"
    - all:
        - pattern: run_valrange_fixpoint($$$ARGS)
        - not:
            regex: "raise_on_nonconvergence\\s*=\\s*True"
    # Module-qualified calls without the kwarg.
    - all:
        - pattern: $MOD.run_forward_fixpoint($$$ARGS)
        - not:
            regex: "raise_on_nonconvergence\\s*=\\s*True"
    - all:
        - pattern: $MOD.run_forward_fixpoint_on_mba($$$ARGS)
        - not:
            regex: "raise_on_nonconvergence\\s*=\\s*True"
    - all:
        - pattern: $MOD.run_valrange_fixpoint($$$ARGS)
        - not:
            regex: "raise_on_nonconvergence\\s*=\\s*True"

note: |
  See `docs/plans/2026-05-25-substrate-purity-static-rules.md` rule R1.

  Recon-to-analysis review caught two consumers that ignored the
  earlier `converged: bool` flag and shipped:
    terminal_return_proof.py:_resolve_carrier_via_reaching_defs
    dead_state_variable_backend._run_valrange_fixpoint
  Slice R1 (this rule + the API change) closes that gap on the
  llvm-lisa-restructure branch.  Both consumers now pass
  `raise_on_nonconvergence=True` and catch `FixpointDidNotConverge`
  to fall back to their existing no-result sentinels.
