# Keep optimizer/runtime strategy code from becoming diagnostic storage/query code.
#
# Optimizers may publish observations through domain facades. SQLite diagnostic
# persistence and DB query helpers belong in d810.core.diag or d810.diagnostics.

id: no-optimizers-diagnostic-storage-imports
language: python
severity: error

files:
  - "src/d810/optimizers/**/*.py"

ignores:
  # Existing legacy HCC diagnostic query. Do not add new exceptions here; move
  # new DB-backed reporting to d810.diagnostics or an observability subscriber.
  - "src/d810/optimizers/microcode/flow/flattening/hodur/strategies/handler_chain_composer.py"

message: |
  Optimizer modules must not import diagnostic storage APIs directly.

  Use observability facades to emit observations. Persist/query SQLite
  diagnostics from d810.core.diag or d810.diagnostics.

rule:
  any:
    - pattern: import sqlite3
    - pattern: import sqlite3 as $ALIAS
    - pattern: from sqlite3 import $$$
    - pattern: from sqlite3 import $NAME as $ALIAS
    - pattern: import d810.core.diag
    - pattern: import d810.core.diag.$MOD
    - pattern: from d810.core.diag import $$$
    - pattern: from d810.core.diag.$MOD import $$$

note: |
  Runtime behavior must use in-memory recon/cfg evidence, not persisted diag DB
  rows. Diagnostic DB rows are an observability/query surface only.
