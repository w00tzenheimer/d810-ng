# Keep recon/cfg generic layers independent from optimizer strategy/runtime code.

id: no-lower-layer-optimizer-imports
language: python
severity: error

files:
  - "src/d810/recon/**/*.py"
  - "src/d810/cfg/**/*.py"

message: |
  Lower layers must not import optimizer runtime modules.

  Move shared types/proofs to recon, cfg, or engine-neutral modules instead of
  reaching upward into d810.optimizers.

rule:
  all:
    - any:
        - pattern: import d810.optimizers
        - pattern: import d810.optimizers.$$$
        - pattern: from d810.optimizers import $$$
        - pattern: from d810.optimizers.$$$ import $$$
    - not:
        inside:
          kind: if_statement
          has:
            field: condition
            regex: TYPE_CHECKING

note: |
  TYPE_CHECKING-only imports are allowed as a temporary annotation bridge.
  Runtime imports must be inverted or moved to a shared lower-layer module.
